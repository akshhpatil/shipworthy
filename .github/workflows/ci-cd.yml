name: CI / CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Test jobs (run in parallel) ──────────────────────────────

  hooks:
    name: Hook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hook tests
        run: |
          for test_file in tests/hooks/test-*.sh; do
            echo "--- Running $(basename "$test_file") ---"
            bash "$test_file"
          done

  skills:
    name: Skill validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skill frontmatter
        run: bash tests/skills/test-skill-frontmatter.sh
      - name: Validate CSO compliance
        run: bash tests/skills/test-cso-format.sh
      - name: Validate skill routing
        run: bash tests/skills/test-skill-routing.sh
      - name: Validate cross-references
        run: bash tests/skills/test-cross-references.sh
      - name: Validate skill quality
        run: bash tests/skills/test-skill-quality.sh

  shellcheck:
    name: ShellCheck (bash linting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint hook scripts
        run: |
          shellcheck -s bash --severity=warning hooks/lib.sh
          for hook in hooks/session-start hooks/pre-tool-use hooks/pre-tool-use-bash hooks/post-tool-use hooks/post-tool-use-write hooks/pre-push-validate; do
            echo "--- Checking $(basename "$hook") ---"
            shellcheck -s bash -x --severity=warning "$hook"
          done
      - name: Lint test scripts
        run: shellcheck -s bash --severity=warning tests/**/*.sh tests/*.sh

  markdownlint:
    name: Markdownlint (skill formatting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint skill files
        run: markdownlint 'skills/**/*.md' --config .markdownlint.json
      - name: Lint docs
        run: markdownlint 'docs/**/*.md' --config .markdownlint.json || true

  structure:
    name: Repository structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repo structure
        run: bash tests/structure/test-repo-structure.sh

  # ── Deploy (only after ALL tests pass) ──────────────────────

  deploy:
    name: Deploy landing page
    needs: [hooks, skills, shellcheck, markdownlint, structure]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for site changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^site/'; then
            echo "site=true" >> "$GITHUB_OUTPUT"
          else
            echo "site=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/configure-pages@v5
        if: steps.changes.outputs.site == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.changes.outputs.site == 'true'
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.changes.outputs.site == 'true'
        uses: actions/deploy-pages@v4
