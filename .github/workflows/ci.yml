name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hook tests
        run: bash tests/run-all-tests.sh

  validate:
    name: Validate structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          files=(
            LICENSE
            README.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            CHANGELOG.md
          )
          missing=0
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "All required files present."

      - name: Check skill frontmatter
        run: |
          error=0
          for skill in skills/*/*/SKILL.md; do
            [ -f "$skill" ] || continue
            for field in name description invoke_when; do
              if ! grep -q "^${field}:" "$skill"; then
                echo "MISSING $field in $skill"
                error=1
              fi
            done
          done
          if [ "$error" -eq 1 ]; then
            exit 1
          fi
          echo "All skill frontmatter valid."

      - name: No secrets in tracked files
        run: |
          if grep -rn --include='*.md' --include='*.sh' --include='*.js' --include='*.ts' --include='*.json' \
            -E '(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|password\s*=\s*".+")' \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude-dir=tests --exclude-dir=skills .; then
            echo "Potential secrets detected in tracked files!"
            exit 1
          fi
          echo "No secrets detected."
