<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #020209; display: flex; align-items: center; justify-content: center; width: 1280px; height: 640px; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; position: relative; }
  .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(139,92,246,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(139,92,246,0.04) 1px, transparent 1px); background-size: 50px 50px; }
  .orb1 { position: absolute; width: 500px; height: 500px; top: -20%; left: -10%; background: rgba(139,92,246,0.1); border-radius: 50%; filter: blur(100px); }
  .orb2 { position: absolute; width: 400px; height: 400px; bottom: -20%; right: -5%; background: rgba(6,182,212,0.07); border-radius: 50%; filter: blur(100px); }
  .content { position: relative; z-index: 1; text-align: center; }
  h1 { font-size: 72px; font-weight: 900; letter-spacing: -3px; color: #f0f0f8; margin: 0 0 12px; line-height: 1.05; }
  .gradient { background: linear-gradient(135deg, #a78bfa, #06b6d4, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  p { font-size: 24px; color: #a0a0bc; margin: 0 0 32px; font-weight: 400; }
  .stats { display: flex; gap: 48px; justify-content: center; }
  .stat { text-align: center; }
  .stat-val { font-size: 36px; font-weight: 800; color: #a78bfa; }
  .stat-label { font-size: 13px; color: #5c5c78; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="content">
    <h1>Vibe Code. <span class="gradient">Ship Production.</span></h1>
    <p>Open Source Claude Code Plugin &middot; 55 Invisible Engineering Skills</p>
    <div class="stats">
      <div class="stat"><div class="stat-val">97%</div><div class="stat-label">With Plugin</div></div>
      <div class="stat"><div class="stat-val">vs</div><div class="stat-label">&nbsp;</div></div>
      <div class="stat"><div class="stat-val">41%</div><div class="stat-label">Without</div></div>
      <div class="stat"><div class="stat-val">0</div><div class="stat-label">Dependencies</div></div>
    </div>
  </div>
</body>
</html>
